<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Selldone OAuth Callback</title>
    <meta name="shop-name" content="pajulina" />
    <meta name="pajulina-app-name" content="Selldone Shop A1" />
    <meta name="pajulina-client-id" content="019e9c01-9f93-7165-a48c-6a4942c9c248" />
    <meta name="pajulina-shop-id" content="14952" />
    <meta name="pajulina-shop-name" content="Pajulina" />
    <meta name="pajulina-shop-domain" content="pajulina.com" />
    <meta name="pajulina-storefront-shop-handle" content="pajulina" />
    <meta name="pajulina-dashboard-path" content="/dashboard/" />
    <meta name="pajulina-callback-path" content="/callback/" />
    <meta name="pajulina-selldone-base" content="https://selldone.com" />
    <meta name="pajulina-api-base" content="https://api.selldone.com" />
    <meta name="pajulina-xapi-base" content="https://xapi.selldone.com" />
    <meta name="pajulina-auth-prompt" content="consent" />
    <style>
      body {
        align-items: center;
        background: #f6f5f1;
        color: #171717;
        display: flex;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }
      main {
        max-width: 420px;
        padding: 32px;
        text-align: center;
      }
      p {
        color: #555;
        line-height: 1.6;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 22px;
      }
      button,
      a {
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        font: inherit;
        padding: 12px 16px;
        text-decoration: none;
      }
      button {
        background: #171717;
        color: #fff;
      }
      a {
        background: #e8e4da;
        color: #171717;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Signing you in</h1>
      <p id="message">Completing the Selldone authorization flow.</p>
      <div id="actions" class="actions" hidden>
        <button type="button" data-login-storefront>Sign in to storefront again</button>
        <button type="button" data-login-dashboard>Sign in to dashboard again</button>
        <a href="/">Back to storefront</a>
      </div>
    </main>
    <script type="module" src="./callback.js"></script>
  </body>
</html>
